[theme]
base            = "light"
primaryColor    = "#2563eb"
backgroundColor = "#f0f4f8"
secondaryBackgroundColor = "#ffffff"
textColor       = "#1e293b"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
