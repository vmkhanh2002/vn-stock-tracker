name: DevSecOps Production CD Pipeline

on:
  workflow_dispatch:
    inputs:
      deployment_tag:
        description: 'Git SHA or Tag to deploy'
        required: true
        default: 'latest'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Enforces review/approval environment gates defined in GitHub Settings
    environment: production
    env:
      REGISTRY: ghcr.io
      WEB_IMAGE_NAME: ${{ github.repository_owner }}/vn-stock-web
      API_IMAGE_NAME: ${{ github.repository_owner }}/vn-stock-api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # ── SIGNATURE VERIFICATION ──────────────────────────────────────────────
      - name: Verify Web Image Signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp 'https://github.com/${{ github.repository_owner }}/.*' \
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:${{ github.event.inputs.deployment_tag }}

      - name: Verify API Image Signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp 'https://github.com/${{ github.repository_owner }}/.*' \
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.event.inputs.deployment_tag }}

      # ── DEPLOYMENT ──────────────────────────────────────────────────────────
      - name: Deploy to Production (K8s/Helm)
        run: |
          echo "Deploying ${{ github.event.inputs.deployment_tag }} to Production Cluster..."
          echo "helm upgrade --install vnstock-app-prod ./deploy/helm/devsecops-app \
            --set web.image.tag=${{ github.event.inputs.deployment_tag }} \
            --set api.image.tag=${{ github.event.inputs.deployment_tag }} \
            --namespace production"
          echo "Production deployment initiated."
