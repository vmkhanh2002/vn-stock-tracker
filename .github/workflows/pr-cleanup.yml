name: Cleanup PR Preview Deployment

on:
  pull_request:
    types: [closed]

jobs:
  cleanup-preview:
    name: Delete Vercel Preview on PR Close
    runs-on: ubuntu-latest
    steps:
      - name: Delete Preview Deployments for Branch
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Cleaning up Vercel preview deployments for branch: $BRANCH"

          UIDS=$(curl -s \
            "https://api.vercel.com/v6/deployments?teamId=team_iQE4xRivacvtTo9IoqBeEdBs&projectId=prj_HlqoGYbQIRzKSpUFAxUb6p0WK72L&target=preview&meta-githubCommitRef=${BRANCH}&limit=20" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r '.deployments[].uid // empty')

          if [ -z "$UIDS" ]; then
            echo "No preview deployments found for branch: $BRANCH"
            exit 0
          fi

          for uid in $UIDS; do
            echo "Deleting: $uid"
            curl -s -X DELETE \
              "https://api.vercel.com/v13/deployments/${uid}?teamId=team_iQE4xRivacvtTo9IoqBeEdBs" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.uid + " deleted"'
          done

          echo "Done. All preview deployments for $BRANCH removed."
