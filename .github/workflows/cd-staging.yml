name: DevSecOps Staging CD Pipeline

on:
  workflow_run:
    workflows: ["DevSecOps CI Pipeline"]
    types:
      - completed

permissions:
  contents: read
  id-token: write # Required for verification validation via OIDC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-staging:
    name: Verify, Deploy & Smoke Test (Staging)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      REGISTRY: ghcr.io
      WEB_IMAGE_NAME: ${{ github.repository_owner }}/vn-stock-web
      API_IMAGE_NAME: ${{ github.repository_owner }}/vn-stock-api
      REPOSITORY_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      # ── VERIFY IMAGE INTEGRITY & SUPPLY CHAIN SIGNATURE ────────────────────
      - name: Verify Web Image Signature
        run: |
          SHA_SHORT=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/${REPOSITORY_OWNER}/.*" \
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:sha-${SHA_SHORT}

      - name: Verify API Image Signature
        run: |
          SHA_SHORT=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/${REPOSITORY_OWNER}/.*" \
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:sha-${SHA_SHORT}

      # ── DRY-RUN DEPLOY / DEPLOYMENT SETUP ─────────────────────────────────
      - name: Mock Deploy to Staging Cluster
        run: |
          SHA_SHORT=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "Deploying to Staging (Kubernetes/Helm)..."
          echo "helm upgrade --install vnstock-app-staging ./deploy/helm/devsecops-app \
            --set web.image.tag=sha-${SHA_SHORT} \
            --set api.image.tag=sha-${SHA_SHORT} \
            --namespace staging --create-namespace"

      # ── SMOKE TEST & DAST HEADER CHECK ──────────────────────────────────────
      - name: Staging Smoke Test & Security Headers Check
        run: |
          echo "Running health checks against staging endpoints..."
          # Mock smoke test pinging /health
          echo "curl -f -s http://staging-api.example.com/health || exit 1"
          echo "curl -f -s http://staging.example.com || exit 1"

          # DAST: Mock checking security headers in staging responses
          echo "Verifying security headers..."
          echo "curl -I -s http://staging.example.com | grep -i 'content-security-policy' || echo 'Warning: CSP header missing'"
          echo "curl -I -s http://staging.example.com | grep -i 'x-frame-options' || echo 'Warning: X-Frame-Options header missing'"
          echo "Staging deploy and verification check PASSED successfully."
