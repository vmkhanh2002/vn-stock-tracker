name: DevSecOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]

# Cancel in-progress runs on the same branch (except main to avoid aborting deploys)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write
  id-token: write        # Cosign keyless signing via OIDC
  pull-requests: write   # Post preview URL comment on PRs
  security-events: write # Upload SARIF to GitHub Security tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── SECRETS SCANNING ────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: "true"

  # ── SAST SCANNING ───────────────────────────────────────────────────────────
  sast-scan:
    name: SAST Scanning (Semgrep)
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep Scan
        run: semgrep scan --config=auto --error --sarif --output semgrep.sarif

      - name: Upload Semgrep Results to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # ── IAC & CONFIGURATION SCANNING ───────────────────────────────────────────
  config-scan:
    name: Configuration Scan (Checkov)
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d . --framework dockerfile,yaml --soft-fail --output sarif 2>/dev/null > checkov.sarif || true

      - name: Upload Checkov Results to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  # ── LINT & CODE QUALITY ─────────────────────────────────────────────────────
  lint-app:
    name: Lint Next.js & Python Code
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node Deps
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Next.js Lint
        run: npm run lint

      - name: npm Audit
        run: npm audit --audit-level=high
        continue-on-error: true # informational until existing dep vulns are resolved

  # ── BUILD, SCAN & SIGN IMAGES ───────────────────────────────────────────────
  build-and-secure:
    name: Build, Scan and Sign Containers
    needs: [secrets-scan, sast-scan, lint-app]
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    timeout-minutes: 30
    env:
      REGISTRY: ghcr.io
      WEB_IMAGE_NAME: ${{ github.repository_owner }}/vn-stock-web
      API_IMAGE_NAME: ${{ github.repository_owner }}/vn-stock-api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Extract Metadata (API)
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # ── BUILD WEB IMAGE ─────────────────────────────────────────────────────
      - name: Build Web Image (Next.js)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── BUILD API IMAGE ─────────────────────────────────────────────────────
      - name: Build API Image (FastAPI)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.python
          push: false
          load: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── TRIVY CONTAINER SCANNING ───────────────────────────────────────────
      - name: Scan Web Image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-web.sarif'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Web Results to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-web.sarif'

      - name: Scan API Image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-api.sarif'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy API Results to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-api.sarif'

      # ── PUSH TO GHCR (AFTER PASSING SCANS) ──────────────────────────────────
      - name: Push Container Images
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:sha-${GITHUB_SHA::7}
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:sha-${GITHUB_SHA::7}

      # ── GENERATE SBOM (SYFT) ────────────────────────────────────────────────
      - name: Generate SBOM (Web)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          format: spdx-json
          artifact-name: web-sbom.spdx.json

      - name: Generate SBOM (API)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          format: spdx-json
          artifact-name: api-sbom.spdx.json

      # ── SIGN IMAGES (COSIGN) ────────────────────────────────────────────────
      - name: Sign Web & API Images
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:sha-${GITHUB_SHA::7}
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:sha-${GITHUB_SHA::7}

  # ── DEPLOY PR PREVIEW (PULL REQUESTS ONLY) ──────────────────────────────────
  deploy-preview:
    name: Deploy PR Preview to Vercel
    needs: [build-and-secure]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    timeout-minutes: 10
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Preview to Vercel
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --yes 2>&1)
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*\.vercel\.app' | tail -1)
          if [ -z "$PREVIEW_URL" ]; then
            echo "Warning: Could not extract preview URL"
          fi
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            if (!url) return;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## DevSecOps CI Passed — Preview Deployment Ready\n\n**Preview URL:** ${url}\n\n_Deployed after: secrets scan, SAST scan, lint, container scan — all passed._`
            });

  # ── DEPLOY TO VERCEL PRODUCTION (MAIN PUSH ONLY) ────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel Production
    needs: [build-and-secure]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        run: vercel deploy --prod --yes

  # ── AUTO-CLOSE FAILED DEPENDABOT PRS ────────────────────────────────────────
  close-failed-dependabot-pr:
    name: Close Failed Dependabot PR
    if: failure() && github.event.action != 'closed' && github.event.pull_request.user.login == 'dependabot[bot]'
    needs: [secrets-scan, sast-scan, lint-app, build-and-secure]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Close Pull Request
        run: |
          gh pr close ${{ github.event.pull_request.number }} --comment "Auto-closing this PR because the CI pipeline failed. Please check the logs."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── CLEANUP VERCEL PREVIEW ON PR CLOSE ──────────────────────────────────────
  cleanup-preview:
    name: Delete Vercel Preview on PR Close
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    timeout-minutes: 5
    steps:
      - name: Delete Preview Deployments for Branch
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Cleaning up Vercel preview deployments for branch: $BRANCH"

          UIDS=$(curl -s \
            "https://api.vercel.com/v6/deployments?teamId=${{ vars.VERCEL_ORG_ID }}&projectId=${{ vars.VERCEL_PROJECT_ID }}&target=preview&meta-githubCommitRef=${BRANCH}&limit=20" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r '.deployments[].uid // empty')

          if [ -z "$UIDS" ]; then
            echo "No preview deployments found for branch: $BRANCH"
            exit 0
          fi

          for uid in $UIDS; do
            echo "Deleting: $uid"
            curl -s -X DELETE \
              "https://api.vercel.com/v13/deployments/${uid}?teamId=${{ vars.VERCEL_ORG_ID }}" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.uid + " deleted"'
          done

          echo "Done. All preview deployments for $BRANCH removed."
