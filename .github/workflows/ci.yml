name: DevSecOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write        # Required for Cosign keyless signing via OIDC
  pull-requests: write   # Required to post preview URL comment on PRs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── SECRETS SCANNING ────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: "true"

  # ── SAST SCANNING ───────────────────────────────────────────────────────────
  sast-scan:
    name: SAST Scanning (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep Scan
        run: semgrep scan --config=auto --error

  # ── IAC & CONFIGURATION SCANNING ───────────────────────────────────────────
  config-scan:
    name: Configuration Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d . --framework dockerfile,yaml --soft-fail --output cli

  # ── LINT & CODE QUALITY ─────────────────────────────────────────────────────
  lint-app:
    name: Lint Next.js & Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node Deps
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Next.js Lint
        run: npm run lint

  # ── BUILD, SCAN & SIGN IMAGES ───────────────────────────────────────────────
  build-and-secure:
    name: Build, Scan and Sign Containers
    needs: [secrets-scan, sast-scan, lint-app]
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      WEB_IMAGE_NAME: ${{ github.repository_owner }}/vn-stock-web
      API_IMAGE_NAME: ${{ github.repository_owner }}/vn-stock-api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Extract Metadata (API)
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # ── BUILD WEB IMAGE ─────────────────────────────────────────────────────
      - name: Build Web Image (Next.js)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── BUILD API IMAGE ─────────────────────────────────────────────────────
      - name: Build API Image (FastAPI)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.python
          push: false
          load: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── TRIVY CONTAINER SCANNING ───────────────────────────────────────────
      - name: Scan Web Image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Scan API Image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # ── PUSH TO GHCR (AFTER PASSING SCANS) ──────────────────────────────────
      - name: Push Container Images
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:sha-${GITHUB_SHA::7}
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:sha-${GITHUB_SHA::7}

      # ── GENERATE SBOM (SYFT) ────────────────────────────────────────────────
      - name: Generate SBOM (Web)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          format: spdx-json
          artifact-name: web-sbom.spdx.json

      - name: Generate SBOM (API)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          format: spdx-json
          artifact-name: api-sbom.spdx.json

      # ── SIGN IMAGES (COSIGN) ────────────────────────────────────────────────
      - name: Sign Web & API Images
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:sha-${GITHUB_SHA::7}
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:sha-${GITHUB_SHA::7}

  # ── DEPLOY PR PREVIEW (PULL REQUESTS ONLY) ──────────────────────────────────
  deploy-preview:
    name: Deploy PR Preview to Vercel
    needs: [secrets-scan, sast-scan, lint-app]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      VERCEL_ORG_ID: team_iQE4xRivacvtTo9IoqBeEdBs
      VERCEL_PROJECT_ID: prj_HlqoGYbQIRzKSpUFAxUb6p0WK72L
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Preview to Vercel
        id: deploy
        run: |
          PREVIEW_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | grep -o 'https://[^ ]*\.vercel\.app' | tail -1)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            if (!url) return;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## DevSecOps CI Passed — Preview Deployment Ready\n\n**Preview URL:** ${url}\n\n_Deployed after: secrets scan, SAST scan, lint — all passed._`
            });

  # ── DEPLOY TO VERCEL PRODUCTION (MAIN PUSH ONLY) ────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel Production
    needs: [build-and-secure]
    runs-on: ubuntu-latest
    # Only deploy when all security gates pass AND pushing to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: team_iQE4xRivacvtTo9IoqBeEdBs
      VERCEL_PROJECT_ID: prj_HlqoGYbQIRzKSpUFAxUb6p0WK72L
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  # ── AUTO-CLOSE FAILED DEPENDABOT PRS ────────────────────────────────────────
  close-failed-dependabot-pr:
    name: Close Failed Dependabot PR
    if: failure() && github.event.pull_request.user.login == 'dependabot[bot]'
    needs: [secrets-scan, sast-scan, lint-app, build-and-secure]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Close Pull Request
        run: |
          echo "CI pipeline failed for Dependabot PR. Automatically closing PR."
          gh pr close ${{ github.event.pull_request.number }} --comment "Auto-closing this PR because the CI pipeline failed. Please check the logs."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
